<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>URL Shortener</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .container {
      background: white;
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    h1 {
      font-size: 1.8rem;
      color: #333;
      margin-bottom: 0.5rem;
      text-align: center;
    }
    .subtitle {
      color: #888;
      text-align: center;
      margin-bottom: 1.8rem;
      font-size: 0.95rem;
    }
    .input-group {
      display: flex;
      gap: 0.5rem;
    }
    .input-group input[type="text"] {
      flex: 1;
      padding: 0.85rem 1rem;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1rem;
      transition: border-color 0.2s;
    }
    .input-group input[type="text"]:focus {
      outline: none;
      border-color: #667eea;
    }
    .btn-submit {
      padding: 0.85rem 1.5rem;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    .btn-submit:hover { opacity: 0.9; }
    .btn-submit:active { transform: scale(0.97); }
    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .error {
      color: #dc3545;
      font-size: 0.9rem;
      margin-top: 0.5rem;
    }
    .result-box {
      margin-top: 1.5rem;
      padding: 1rem;
      background: #f8f9ff;
      border-radius: 10px;
      border: 1px solid #e8eaff;
    }
    .result-label {
      font-size: 0.8rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.4rem;
    }
    .result-url {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .result-url a {
      color: #667eea;
      text-decoration: none;
      font-weight: 500;
      word-break: break-all;
    }
    .result-url a:hover { text-decoration: underline; }
    .copy-btn {
      background: #e8eaff;
      border: none;
      border-radius: 6px;
      padding: 0.4rem 0.8rem;
      font-size: 0.8rem;
      cursor: pointer;
      color: #667eea;
      font-weight: 500;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
    }
    .copy-btn:hover { background: #dde0ff; }
    .copy-btn.copied { background: #d4edda; color: #155724; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔗 URL Shortener</h1>
    <p class="subtitle">Paste a long URL to make it short</p>

    <form id="shortenForm" method="POST" action="/shorten">
      <div class="input-group">
        <input
          type="text"
          id="urlInput"
          name="url"
          placeholder="https://example.com/very/long/url"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
        />
        <button type="submit" id="submitBtn" class="btn-submit">Shorten</button>
      </div>
    </form>

    <div id="errorMsg" class="error" style="display:none"></div>
    <div id="resultBox" style="display:none"></div>
  </div>

  <script>
    (function() {
      var STORAGE_KEY = 'url_shortener_result';
      var STORAGE_TTL = 120000;
      var form = document.getElementById('shortenForm');
      var urlInput = document.getElementById('urlInput');
      var submitBtn = document.getElementById('submitBtn');
      var resultBox = document.getElementById('resultBox');
      var errorMsg = document.getElementById('errorMsg');
      var isLoading = false;

      var params = new URLSearchParams(location.search);
      var serverShort = params.get('short');
      var serverKey = params.get('key');
      var serverError = params.get('error');

      if (serverShort && serverKey) {
        var escaped = serverShort.replace(/&/g, '&amp;').replace(/</g, '&lt;');
        renderResult(escaped, serverKey, serverShort);
        history.replaceState(null, '', '/');
      } else if (serverError) {
        showError(serverError);
        history.replaceState(null, '', '/');
      }

      restoreFromStorage();

      window.addEventListener('pageshow', function(e) {
        if (e.persisted) {
          restoreFromStorage();
        }
      });

      function restoreFromStorage() {
        try {
          var saved = localStorage.getItem(STORAGE_KEY);
          if (!saved) return;
          var data = JSON.parse(saved);
          if (!data || !data.html || !data.timestamp) {
            localStorage.removeItem(STORAGE_KEY);
            return;
          }
          if (Date.now() - data.timestamp > STORAGE_TTL) {
            localStorage.removeItem(STORAGE_KEY);
            return;
          }
          resultBox.innerHTML = data.html;
          resultBox.style.display = 'block';
          attachCopyBtn(data.shortUrl);
        } catch(e) { /* ignore */ }
      }

      function saveToStorage(html, shortUrl) {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify({
            html: html,
            shortUrl: shortUrl,
            timestamp: Date.now()
          }));
        } catch(e) { /* ignore */ }
      }

      function renderResult(escaped, shortKey, shortUrl) {
        var html =
          '<div class="result-box">' +
            '<div class="result-label">Your shortened URL</div>' +
            '<div class="result-url">' +
              '<a href="' + escaped + '" target="_blank" rel="noopener">' + escaped + '</a>' +
              '<button id="copyBtn" class="copy-btn" type="button">Copy</button>' +
            '</div>' +
          '</div>';
        resultBox.innerHTML = html;
        resultBox.style.display = 'block';
        saveToStorage(html, shortUrl);
        attachCopyBtn(shortUrl);
      }

      function attachCopyBtn(shortUrl) {
        var btn = document.getElementById('copyBtn');
        if (!btn) return;
        btn.addEventListener('click', function() {
          if (btn.classList.contains('copied')) return;
          var ok = function() {
            btn.textContent = 'Copied!';
            btn.classList.add('copied');
          };
          try {
            navigator.clipboard.writeText(shortUrl).then(ok);
          } catch(e) {
            var ta = document.createElement('textarea');
            ta.value = shortUrl;
            ta.style.cssText = 'position:fixed;opacity:0';
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            ok();
          }
        });
      }

      function showError(msg) {
        errorMsg.textContent = msg;
        errorMsg.style.display = 'block';
      }

      form.addEventListener('submit', function(e) {
        e.preventDefault();
        if (isLoading) return;
        var url = urlInput.value.trim();
        if (!url) return;

        isLoading = true;
        errorMsg.style.display = 'none';
        resultBox.style.display = 'none';
        resultBox.innerHTML = '';
        localStorage.removeItem(STORAGE_KEY);

        submitBtn.disabled = true;
        submitBtn.textContent = 'Shortening...';

        fetch('/api/shorten', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: url })
        })
        .then(function(res) { return res.json(); })
        .then(function(data) {
          if (data.error) {
            showError(data.error);
            return;
          }
          var escaped = data.short_url.replace(/&/g, '&amp;').replace(/</g, '&lt;');
          renderResult(escaped, data.short_key, data.short_url);
          urlInput.value = '';
        })
        .catch(function() {
          form.submit();
        })
        .finally(function() {
          isLoading = false;
          submitBtn.disabled = false;
          submitBtn.textContent = 'Shorten';
        });
      });

      urlInput.focus();
    })();
  </script>
</body>
</html>
