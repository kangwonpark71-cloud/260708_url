<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Shortener</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .container {
      background: white;
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    h1 {
      font-size: 1.8rem;
      color: #333;
      margin-bottom: 0.5rem;
      text-align: center;
    }
    .subtitle {
      color: #888;
      text-align: center;
      margin-bottom: 1.8rem;
      font-size: 0.95rem;
    }
    .input-group {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    input[type="url"] {
      flex: 1;
      padding: 0.85rem 1rem;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1rem;
      transition: border-color 0.2s;
    }
    input[type="url"]:focus {
      outline: none;
      border-color: #667eea;
    }
    button {
      padding: 0.85rem 1.5rem;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    button:hover { opacity: 0.9; }
    button:active { transform: scale(0.97); }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .result {
      display: none;
      margin-top: 1.5rem;
      padding: 1rem;
      background: #f8f9ff;
      border-radius: 10px;
      border: 1px solid #e8eaff;
    }
    .result.show { display: block; }
    .result-label {
      font-size: 0.8rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.4rem;
    }
    .result-url {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .result-url a {
      color: #667eea;
      text-decoration: none;
      font-weight: 500;
      word-break: break-all;
    }
    .result-url a:hover { text-decoration: underline; }
    .copy-btn {
      background: #e8eaff;
      border: none;
      border-radius: 6px;
      padding: 0.4rem 0.8rem;
      font-size: 0.8rem;
      cursor: pointer;
      color: #667eea;
      font-weight: 500;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .copy-btn:hover { background: #dde0ff; }
    .copy-btn.copied { background: #d4edda; color: #155724; }
    .error {
      color: #dc3545;
      font-size: 0.9rem;
      margin-top: 0.5rem;
      display: none;
    }
    .error.show { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔗 URL Shortener</h1>
    <p class="subtitle">Paste a long URL to make it short</p>

    <div class="input-group">
      <input
        type="url"
        id="urlInput"
        placeholder="https://example.com/very/long/url"
      />
      <button type="button" id="submitBtn">Shorten</button>
    </div>

    <div id="errorMsg" style="margin-top:0.5rem;display:none"></div>

    <div id="resultBox" style="display:none"></div>
  </div>

  <div id="debug" style="position:fixed;bottom:0;left:0;right:0;background:#111;color:#0f0;font:12px/1.5 monospace;padding:8px 12px;z-index:9999;max-height:200px;overflow:auto;white-space:pre-wrap;word-break:break-all;"></div>
  <script>
    (function() {
      var PAGE_ID = Date.now();
      var debugEl = document.getElementById('debug');
      var logCount = 0;
      function log(msg) {
        logCount++;
        var t = new Date().toISOString().substr(11,12);
        debugEl.textContent += '[' + t + '#' + logCount + '] ' + msg + '\n';
        debugEl.scrollTop = debugEl.scrollHeight;
        console.log('[DEBUG#' + logCount + '] ' + msg);
      }
      log('PAGE_LOADED page_id=' + PAGE_ID + ' url=' + location.href);

      // Detect page unload (navigation/reload)
      window.addEventListener('beforeunload', function() {
        log('BEFOREUNLOAD fired! page_id=' + PAGE_ID);
      });
      window.addEventListener('unload', function() {
        log('UNLOAD fired!');
      });

      // Detect popstate (back/forward navigation)
      window.addEventListener('popstate', function() {
        log('POPSTATE fired!');
      });

      var urlInput = document.getElementById('urlInput');
      var submitBtn = document.getElementById('submitBtn');
      var resultBox = document.getElementById('resultBox');
      var errorMsg = document.getElementById('errorMsg');
      var isLoading = false;

      // MutationObserver: watch resultBox for ANY changes
      var observer = new MutationObserver(function(mutations) {
        mutations.forEach(function(m) {
          log('MUTATION type=' + m.type + ' target=' + m.target.id + ' added=' + m.addedNodes.length + ' removed=' + m.removedNodes.length + ' attr=' + (m.attributeName || 'none'));
          if (m.type === 'attributes' && m.attributeName === 'style') {
            log('  resultBox style changed to: ' + resultBox.getAttribute('style'));
          }
        });
      });
      observer.observe(resultBox, { attributes: true, childList: true, subtree: true, attributeOldValue: true });
      log('MutationObserver attached to resultBox');

      // MutationObserver on entire body
      var bodyObserver = new MutationObserver(function(mutations) {
        mutations.forEach(function(m) {
          if (m.type === 'childList' && m.removedNodes.length > 0) {
            for (var i = 0; i < m.removedNodes.length; i++) {
              var n = m.removedNodes[i];
              if (n.nodeType === 1) log('BODY_CHILD_REMOVED tag=' + n.tagName + ' id=' + n.id);
            }
          }
        });
      });
      bodyObserver.observe(document.body, { childList: true, subtree: true });
      log('Body-level MutationObserver attached');

      // Watch for hash changes
      window.addEventListener('hashchange', function() {
        log('HASHCHANGE new_hash=' + location.hash);
      });

      function setResult(html) {
        log('setResult called, html length=' + (html ? html.length : 0));
        resultBox.innerHTML = html;
        resultBox.style.display = html ? 'block' : 'none';
        log('resultBox display=' + resultBox.style.display + ' innerHTML length=' + resultBox.innerHTML.length);
      }

      function setError(msg) {
        log('setError: ' + msg);
        errorMsg.textContent = msg;
        errorMsg.style.color = '#dc3545';
        errorMsg.style.display = msg ? 'block' : 'none';
      }

      async function handleShorten() {
        log('handleShorten START isLoading=' + isLoading);
        if (isLoading) return;
        var url = urlInput.value.trim();
        if (!url) { log('handleShorten: empty URL, returning'); return; }

        isLoading = true;
        setError('');
        setResult('');

        submitBtn.disabled = true;
        submitBtn.textContent = 'Shortening...';

        try {
          log('fetch POST /api/shorten url=' + url);
          var res = await fetch('/api/shorten', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url: url })
          });
          log('fetch response status=' + res.status + ' ok=' + res.ok);

          var data = await res.json();
          log('fetch data: ' + JSON.stringify(data));

          if (!res.ok) {
            setError(data.error || 'Something went wrong');
            return;
          }

          var shortUrl = data.short_url;
          var escaped = shortUrl.replace(/&/g,'&amp;').replace(/</g,'&lt;');
          log('setResult with short_url=' + shortUrl);

          setResult(
            '<div style="font-size:0.8rem;color:#888;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:0.4rem">Your shortened URL</div>' +
            '<div style="display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap">' +
              '<a href="' + escaped + '" target="_blank" style="color:#667eea;text-decoration:none;font-weight:500;word-break:break-all">' + escaped + '</a>' +
              '<button id="copyBtn" style="background:#e8eaff;border:none;border-radius:6px;padding:0.4rem 0.8rem;font-size:0.8rem;cursor:pointer;color:#667eea;font-weight:500;white-space:nowrap;flex-shrink:0">Copy</button>' +
            '</div>' +
            '<div style="margin-top:0.5rem;font-size:0.75rem;color:#aaa">page:' + PAGE_ID + ' | short:' + data.short_key + '</div>'
          );

          log('resultBox after set: display=' + resultBox.style.display + ' childNodes=' + resultBox.childNodes.length);

          var copyBtn = document.getElementById('copyBtn');
          if (copyBtn) {
            copyBtn.addEventListener('click', function() {
              try {
                navigator.clipboard.writeText(shortUrl).then(function() {
                  copyBtn.textContent = 'Copied!';
                  copyBtn.style.background = '#d4edda';
                  copyBtn.style.color = '#155724';
                });
              } catch(e) {
                var ta = document.createElement('textarea');
                ta.value = shortUrl;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                copyBtn.textContent = 'Copied!';
                copyBtn.style.background = '#d4edda';
                copyBtn.style.color = '#155724';
              }
            });
            log('copyBtn listener attached');
          } else {
            log('WARNING: copyBtn not found in DOM after setResult!');
          }

          urlInput.value = '';
          log('handleShorten SUCCESS');
        } catch (err) {
          log('handleShorten ERROR: ' + err);
          setError('Network error. Please try again.');
        } finally {
          isLoading = false;
          submitBtn.disabled = false;
          submitBtn.textContent = 'Shorten';
        }
      }

      submitBtn.addEventListener('click', function() { log('submitBtn CLICK'); handleShorten(); });
      urlInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          log('Enter KEYDOWN');
          handleShorten();
        }
      });

      urlInput.focus();
      log('init complete');
    })();
  </script>
</body>
</html>
