<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Shortener</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .container {
      background: white;
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    h1 {
      font-size: 1.8rem;
      color: #333;
      margin-bottom: 0.5rem;
      text-align: center;
    }
    .subtitle {
      color: #888;
      text-align: center;
      margin-bottom: 1.8rem;
      font-size: 0.95rem;
    }
    .input-group {
      display: flex;
      gap: 0.5rem;
    }
    input[type="text"] {
      flex: 1;
      padding: 0.85rem 1rem;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1rem;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: #667eea;
    }
    button {
      padding: 0.85rem 1.5rem;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    button:hover { opacity: 0.9; }
    button:active { transform: scale(0.97); }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .error {
      color: #dc3545;
      font-size: 0.9rem;
      margin-top: 0.5rem;
    }
    .result {
      margin-top: 1.5rem;
      padding: 1rem;
      background: #f8f9ff;
      border-radius: 10px;
      border: 1px solid #e8eaff;
    }
    .result-label {
      font-size: 0.8rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.4rem;
    }
    .result-url {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .result-url a {
      color: #667eea;
      text-decoration: none;
      font-weight: 500;
      word-break: break-all;
    }
    .result-url a:hover { text-decoration: underline; }
    .copy-btn {
      background: #e8eaff;
      border: none;
      border-radius: 6px;
      padding: 0.4rem 0.8rem;
      font-size: 0.8rem;
      cursor: pointer;
      color: #667eea;
      font-weight: 500;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
    }
    .copy-btn:hover { background: #dde0ff; }
    .copy-btn.copied { background: #d4edda; color: #155724; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔗 URL Shortener</h1>
    <p class="subtitle">Paste a long URL to make it short</p>

    <form id="shortenForm" onsubmit="return false" style="margin:0;padding:0">
      <div class="input-group">
        <input
          type="text"
          id="urlInput"
          placeholder="https://example.com/very/long/url"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
        />
        <button type="submit" id="submitBtn">Shorten</button>
      </div>
    </form>

    <div id="errorMsg" class="error" style="display:none"></div>
    <div id="resultBox" style="display:none"></div>
  </div>

  <script>
    (function() {
      var STORAGE_KEY = 'url_shortener_result';
      var STORAGE_TTL = 60000;
      var shortenForm = document.getElementById('shortenForm');
      var urlInput = document.getElementById('urlInput');
      var submitBtn = document.getElementById('submitBtn');
      var resultBox = document.getElementById('resultBox');
      var errorMsg = document.getElementById('errorMsg');
      var isLoading = false;

      // Restore result from localStorage (handles page reload / bfcache)
      restoreFromStorage();

      // Also listen for pageshow (bfcache restoration)
      window.addEventListener('pageshow', function(e) {
        if (e.persisted) {
          restoreFromStorage();
        }
      });

      function restoreFromStorage() {
        try {
          var saved = localStorage.getItem(STORAGE_KEY);
          if (!saved) return;
          var data = JSON.parse(saved);
          if (!data || !data.html || !data.timestamp) return;
          if (Date.now() - data.timestamp > STORAGE_TTL) {
            localStorage.removeItem(STORAGE_KEY);
            return;
          }
          resultBox.innerHTML = data.html;
          resultBox.style.display = 'block';
          attachCopyListener(data.shortUrl);
        } catch(e) { /* ignore */ }
      }

      function saveToStorage(html, shortUrl) {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify({
            html: html,
            shortUrl: shortUrl,
            timestamp: Date.now()
          }));
        } catch(e) { /* ignore */ }
      }

      function attachCopyListener(shortUrl) {
        var copyBtn = document.getElementById('copyBtn');
        if (!copyBtn) return;
        copyBtn.addEventListener('click', function() {
          if (copyBtn.classList.contains('copied')) return;
          var onSuccess = function() {
            copyBtn.textContent = 'Copied!';
            copyBtn.classList.add('copied');
          };
          try {
            navigator.clipboard.writeText(shortUrl).then(onSuccess);
          } catch(e) {
            var ta = document.createElement('textarea');
            ta.value = shortUrl;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            onSuccess();
          }
        });
      }

      shortenForm.addEventListener('submit', function(e) {
        e.preventDefault();
        e.stopPropagation();
        handleShorten();
      });

      async function handleShorten() {
        if (isLoading) return;
        var url = urlInput.value.trim();
        if (!url) return;

        isLoading = true;
        errorMsg.style.display = 'none';
        resultBox.style.display = 'none';
        resultBox.innerHTML = '';
        localStorage.removeItem(STORAGE_KEY);

        submitBtn.disabled = true;
        submitBtn.textContent = 'Shortening...';

        try {
          var res = await fetch('/api/shorten', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url: url })
          });
          var data = await res.json();

          if (!res.ok) {
            errorMsg.textContent = data.error || 'Something went wrong';
            errorMsg.style.display = 'block';
            return;
          }

          var shortUrl = data.short_url;
          var escaped = shortUrl.replace(/&/g, '&amp;').replace(/</g, '&lt;');

          var html =
            '<div class="result">' +
              '<div class="result-label">Your shortened URL</div>' +
              '<div class="result-url">' +
                '<a href="' + escaped + '" target="_blank" rel="noopener">' + escaped + '</a>' +
                '<button id="copyBtn" class="copy-btn" type="button">Copy</button>' +
              '</div>' +
            '</div>';

          resultBox.innerHTML = html;
          resultBox.style.display = 'block';
          saveToStorage(html, shortUrl);
          attachCopyListener(shortUrl);

          urlInput.value = '';
        } catch(err) {
          errorMsg.textContent = 'Network error. Please try again.';
          errorMsg.style.display = 'block';
        } finally {
          isLoading = false;
          submitBtn.disabled = false;
          submitBtn.textContent = 'Shorten';
        }
      }

      urlInput.focus();
    })();
  </script>
</body>
</html>
